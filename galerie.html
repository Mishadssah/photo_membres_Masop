<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Galerie | MASOP</title>
    <meta name="description" content="Galerie photo des actions MASOP en Haiti.">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/styles.css">
</head>
<body class="bg-gray-50 flex flex-col min-h-screen">
    <button id="scrollToTopBtn" class="hidden fixed bottom-24 right-6 bg-teal-600 text-white p-3 rounded-full shadow-lg hover:bg-teal-700 focus:outline-none" aria-label="Retour en haut"><i class="fas fa-chevron-up"></i></button>
    <nav class="fixed w-full bg-white shadow-md z-50"><div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8"><div class="flex justify-between h-20 items-center"><a href="index.html" class="flex-shrink-0 flex items-center space-x-3 no-underline"><img src="logo_masop_rev2.png" alt="Logo MASOP" class="logo"><div><span class="text-2xl font-bold text-teal-700 block">MASOP</span><span class="text-sm text-gray-600">Maison de Soins Psychologiques</span></div></a><div class="hidden md:block"><div class="ml-10 flex items-baseline space-x-4"><a href="a-propos.html" class="text-gray-600 px-3 py-2 text-sm font-medium hover:text-teal-500">A propos</a><a href="services.html" class="text-gray-600 px-3 py-2 text-sm font-medium hover:text-teal-500">Services</a><a href="nos-actions.html" class="text-gray-600 px-3 py-2 text-sm font-medium hover:text-teal-500">Actions</a><a href="galerie.html" class="text-teal-700 px-3 py-2 text-sm font-medium">Galerie</a><a href="equipe.html" class="text-gray-600 px-3 py-2 text-sm font-medium hover:text-teal-500">Equipe</a><a href="contact.html" class="text-gray-600 px-3 py-2 text-sm font-medium hover:text-teal-500">Contact</a></div></div><div class="md:hidden"><button id="menu-toggle" aria-controls="mobile-menu" aria-expanded="false" class="text-gray-600 hover:text-teal-500 focus:outline-none"><svg class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"></path></svg></button></div></div></div><div id="mobile-menu" aria-hidden="true" class="hidden md:hidden bg-white shadow-lg"><div class="px-2 pt-2 pb-3 space-y-1 sm:px-3"><a href="galerie.html" class="block px-3 py-2 text-base font-medium text-teal-700">Galerie</a><a href="index.html" class="block px-3 py-2 text-base font-medium text-gray-600 hover:text-teal-500">Accueil</a></div></div></nav>

    <main class="flex-1 pt-24 pb-16">
        <section class="py-12 md:py-20 bg-gray-50">
            <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
                <div class="text-center mb-8"><h1 class="text-3xl font-extrabold text-gray-900 sm:text-4xl">Nos actions en images</h1><div class="mt-4 h-1 w-20 bg-teal-500 mx-auto"></div><p class="mt-4 max-w-2xl text-xl text-gray-600 mx-auto">Galerie organisee par mois - selectionnez un mois pour filtrer les photos</p></div>

                <div class="flex flex-col md:flex-row md:items-center md:justify-between mb-6 space-y-4 md:space-y-0">
                    <div class="flex flex-wrap gap-2 pb-2">
                        <button data-filter="all" class="filter-btn bg-teal-600 text-white px-4 py-2 rounded-md text-sm font-medium shadow hover:bg-teal-700" aria-pressed="true">Tout afficher <span id="count-all" class="ml-2 inline-block bg-white text-teal-700 text-xs font-semibold px-2 py-0.5 rounded">0</span></button>
                        <button data-filter="2025-12" class="filter-btn bg-white text-teal-700 border border-teal-200 px-4 py-2 rounded-md text-sm font-medium shadow-sm hover:bg-teal-50">Decembre 2025 <span id="count-2025-12" class="ml-2 inline-block bg-teal-600 text-white text-xs font-semibold px-2 py-0.5 rounded">0</span></button>
                        <button data-filter="2025-11" class="filter-btn bg-white text-teal-700 border border-teal-200 px-4 py-2 rounded-md text-sm font-medium shadow-sm hover:bg-teal-50">Novembre 2025 <span id="count-2025-11" class="ml-2 inline-block bg-teal-600 text-white text-xs font-semibold px-2 py-0.5 rounded">0</span></button>
                        <button data-filter="2026-01" class="filter-btn bg-white text-teal-700 border border-teal-200 px-4 py-2 rounded-md text-sm font-medium shadow-sm hover:bg-teal-50">Janvier 2026 <span id="count-2026-01" class="ml-2 inline-block bg-teal-600 text-white text-xs font-semibold px-2 py-0.5 rounded">0</span></button>
                        <button data-filter="2026-03" class="filter-btn bg-white text-teal-700 border border-teal-200 px-4 py-2 rounded-md text-sm font-medium shadow-sm hover:bg-teal-50">Mars 2026 <span id="count-2026-03" class="ml-2 inline-block bg-teal-600 text-white text-xs font-semibold px-2 py-0.5 rounded">0</span></button>
                    </div>
                    <div class="text-sm text-gray-600">Affichage : <span id="currentMonthLabel" class="font-semibold">Tout</span></div>
                </div>

                <div id="galleryGrid" class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 gap-4">
                    <figure class="gallery-item bg-white rounded-lg overflow-hidden shadow-md hover:scale-105 transition duration-300 cursor-pointer" data-month="2025-12" data-title="Remise de certificats" data-date="Dec 2025"><img src="images/gallery/photo_remise_certificat.jpeg" alt="Remise de certificats" class="w-full object-contain" loading="lazy" decoding="async"><figcaption class="p-3 bg-white"><div class="text-sm font-semibold text-gray-800">Remise de certificats</div><div class="text-xs text-gray-500">Decembre 2025</div></figcaption></figure>
                    <figure class="gallery-item bg-white rounded-lg overflow-hidden shadow-md hover:scale-105 transition duration-300 cursor-pointer" data-month="2025-11" data-title="Intervention du President" data-date="Nov 2025"><img src="images/gallery/intervention_president_masop_22festival_4chemins.jpg" alt="Intervention du President" class="w-full object-contain" loading="lazy" decoding="async"><figcaption class="p-3 bg-white"><div class="text-sm font-semibold text-gray-800">Intervention du President</div><div class="text-xs text-gray-500">Novembre 2025</div></figcaption></figure>
                    <figure class="gallery-item bg-white rounded-lg overflow-hidden shadow-md hover:scale-105 transition duration-300 cursor-pointer" data-month="2026-01" data-title="Activite terrain" data-date="Jan 2026"><img src="images/gallery/REPI_Visite_Site_ENRE_IMJMC_Delmas_06-09jan2026.jpeg" alt="Activite terrain janvier 2026" class="w-full object-contain" loading="lazy" decoding="async"><figcaption class="p-3 bg-white"><div class="text-sm font-semibold text-gray-800">Activite terrain</div><div class="text-xs text-gray-500">Janvier 2026</div></figcaption></figure>
                    <figure class="gallery-item bg-white rounded-lg overflow-hidden shadow-md hover:scale-105 transition duration-300 cursor-pointer" data-month="2026-03" data-title="Droits des femmes" data-date="Mar 2026"><img src="images/gallery/photo_femmes_lutte_droit_8_mars_2026.jpg.jpg" alt="Droits des femmes 8 mars" class="w-full object-contain" loading="lazy" decoding="async"><figcaption class="p-3 bg-white"><div class="text-sm font-semibold text-gray-800">Droits des femmes</div><div class="text-xs text-gray-500">Mars 2026</div></figcaption></figure>
                    <div id="emptyPlaceholder" class="hidden col-span-full text-center py-12 text-gray-500">Aucune photo pour ce mois pour le moment.</div>
                </div>
            </div>

            <div id="lightbox" class="fixed inset-0 bg-black bg-opacity-70 hidden items-center justify-center p-4 z-50"><div class="relative max-w-4xl w-full"><button id="lightboxClose" class="absolute right-0 top-0 text-white text-2xl p-2 hover:text-gray-300 z-10">&times;</button><button id="lightboxPrev" class="absolute left-0 top-1/2 transform -translate-y-1/2 -translate-x-12 text-white text-4xl p-2 z-10"><i class="fas fa-chevron-left"></i></button><button id="lightboxNext" class="absolute right-0 top-1/2 transform -translate-y-1/2 translate-x-12 text-white text-4xl p-2 z-10"><i class="fas fa-chevron-right"></i></button><img id="lightboxImage" src="" alt="" class="w-full max-h-[80vh] object-contain rounded-md"><div id="lightboxCaption" class="mt-2 text-white text-sm text-center"></div><div id="lightboxCounter" class="mt-2 text-white text-xs text-center text-gray-300"></div></div></div>
        </section>
    </main>

    <footer class="bg-gray-900 text-white pt-12 pb-8 mt-20"><div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8"><p class="text-center text-gray-500 text-sm">© 2026 MASOP - Tous droits reserves</p></div></footer>
    <script src="js/main.js"></script>
</body>
</html>
